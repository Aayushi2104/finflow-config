server:
  port: 8081

spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/finflow_auth_db?createDatabaseIfNotExist=true}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
