server:
  port: 8086

spring:
  datasource:
    url: ${ADMIN_DB_URL:jdbc:mysql://localhost:3306/finflow_admin_db?createDatabaseIfNotExist=true}
    username: ${ADMIN_DB_USERNAME:root}
    password: ${ADMIN_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

services:
  application-service:
    url: http://localhost:8082
  auth-service:
    url: http://localhost:8081

resilience4j:
  circuitbreaker:
    instances:
      applicationService:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
      authService:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
  retry:
    instances:
      applicationService:
        max-attempts: 3
        wait-duration: 500ms
      authService:
        max-attempts: 3
        wait-duration: 500ms
