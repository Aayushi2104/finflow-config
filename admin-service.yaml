server:
  port: 8086

spring:
  datasource:
    url: ${ADMIN_DB_URL:jdbc:mysql://localhost:3306/finflow_admin_db?createDatabaseIfNotExist=true}
    username: ${ADMIN_DB_USERNAME:root}
    password: ${ADMIN_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

services:
  application-service:
    url: http://localhost:8082
  auth-service:
    url: http://localhost:8081
