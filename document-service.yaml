server:
  port: 8085

spring:
  datasource:
    url: ${DOCUMENT_DB_URL:jdbc:mysql://localhost:3306/finflow_doc_db?createDatabaseIfNotExist=true}
    username: ${DOCUMENT_DB_USERNAME:root}
    password: ${DOCUMENT_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

file:
  upload-dir: ${FILE_UPLOAD_DIR:C:/finflow/uploads}
